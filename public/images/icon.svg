    </filter>
  </defs>

  <g filter="url(#navGlow)" stroke="url(#headerLogoGrad)" stroke-linecap="round" fill="none">
    
    <circle cx="65" cy="55" r="11" fill="url(#headerLogoGrad)" stroke="none" />
    
    <path d="M 65,95 
             L 65,145 
             A 30,30 0 0,0 125,145 
             L 125,100 
