<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="100%" height="100%">
  <defs>
    <linearGradient id="headerLogoGrad" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="#8ce7ff" />
      <stop offset="40%" stop-color="#7da2f0" />
      <stop offset="100%" stop-color="#b692f6" />
    </linearGradient>

    <filter id="navGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
